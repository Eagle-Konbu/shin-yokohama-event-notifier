name: Terraform CI

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-ci.yml'
      - 'Taskfile.yml'

jobs:
  terraform-format-check:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ~1.0

      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ~1.0

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Task
        uses: go-task/setup-task@70f2430ad412f838533de8c0515c749ffb2b8bd3 # v1

      - name: Terraform Init (Backend Disabled)
        run: terraform init -backend=false

      - name: Build and package daily Lambda
        working-directory: .
        run: task package-daily

      - name: Build and package weekly Lambda
        working-directory: .
        run: task package-weekly

      - name: Terraform Validate
        run: terraform validate

  tflint:
    name: Terraform Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4
        with:
          tflint_version: latest

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --format compact

  tfsec-security-scan:
    name: Terraform Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
        with:
          working_directory: terraform
          soft_fail: true
          github_token: ${{ github.token }}

      - name: tfsec PR Commenter
        uses: aquasecurity/tfsec-pr-commenter-action@7a44c5dcde5dfab737363e391800629e27b6376b # v1.3.1
        continue-on-error: true
        with:
          github_token: ${{ github.token }}
          working_directory: terraform
          soft_fail_commenter: true

  terraform-version-check:
    name: Terraform Version Consistency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check Terraform Version Constraint
        run: |
          VERSION_CONSTRAINT=$(grep -A 1 'required_version' terraform/versions.tf | grep -oP '">= \K[0-9.]+' || echo "")
          if [ -z "$VERSION_CONSTRAINT" ]; then
            echo "::error::No Terraform version constraint found in versions.tf"
            exit 1
          fi

          echo "Terraform version constraint: >= $VERSION_CONSTRAINT"

          # Check if using a specific version or just minimum
          if [[ ! "$VERSION_CONSTRAINT" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "::warning::Consider using a more specific version constraint (e.g., ~> 1.5)"
          fi

          # Verify setup-terraform action uses compatible version
          SETUP_TF_VERSION=$(grep -A 2 'hashicorp/setup-terraform' .github/workflows/*.yml | grep 'terraform_version' | head -1 | grep -oP ':\s*\K.*' | tr -d ' "' || echo "")
          if [ -n "$SETUP_TF_VERSION" ]; then
            echo "GitHub Actions uses Terraform version: $SETUP_TF_VERSION"
          fi
