name: Deploy to AWS Lambda

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Setup Task
        uses: go-task/setup-task@70f2430ad412f838533de8c0515c749ffb2b8bd3 # v1

      - name: Run tests
        run: task test

      - name: Build and package daily Lambda
        run: task package-daily

      - name: Build and package weekly Lambda
        run: task package-weekly

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1
          role-session-name: github-actions-deploy

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Terraform Init
        run: task init

      - name: Terraform Plan
        run: task plan
        env:
          TF_VAR_grafana_url: ${{ secrets.GRAFANA_URL }}
          TF_VAR_grafana_auth: ${{ secrets.GRAFANA_AUTH }}

      - name: Terraform Apply
        run: task apply-ci
        env:
          TF_VAR_grafana_url: ${{ secrets.GRAFANA_URL }}
          TF_VAR_grafana_auth: ${{ secrets.GRAFANA_AUTH }}

      - name: Update Discord Webhook Secret
        run: |
          SECRET_ARN=$(cd terraform && terraform output -raw discord_webhook_secret_arn)
          aws secretsmanager put-secret-value \
            --secret-id "$SECRET_ARN" \
            --secret-string "${{ secrets.DISCORD_WEBHOOK_URL }}"
